<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mensagem enviada | DC Transportes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy: #0d1b4b;
      --navy-2: #112c69;
      --red: #e8001d;
      --red-dark: #b80017;
      --globe: #9fb9d8;
      --white: #fff;
      --gray: #eef2f7;
      --text: #1b2230;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Barlow', Arial, sans-serif;
      background:
        radial-gradient(circle at 18% 18%, rgba(232,0,29,0.18), transparent 28%),
        radial-gradient(circle at 82% 24%, rgba(159,185,216,0.24), transparent 30%),
        linear-gradient(135deg, #071234 0%, var(--navy) 52%, #06102d 100%);
      color: var(--white);
      display: grid;
      place-items: center;
      padding: 28px;
    }

    .success-shell {
      width: min(100%, 920px);
      background: rgba(255,255,255,0.96);
      color: var(--text);
      border-radius: 8px;
      box-shadow: 0 30px 80px rgba(0,0,0,0.28);
      overflow: hidden;
      border-top: 6px solid var(--red);
    }

    .success-content {
      display: grid;
      grid-template-columns: 1fr 1.4fr;
      gap: 36px;
      align-items: center;
      padding: clamp(32px, 6vw, 64px);
    }

    .brand-panel {
      min-height: 260px;
      border-radius: 6px;
      background: linear-gradient(145deg, var(--navy), var(--navy-2));
      display: grid;
      place-items: center;
      padding: 32px;
      position: relative;
      overflow: hidden;
    }

    .brand-panel::after {
      content: "";
      position: absolute;
      width: 190px;
      height: 190px;
      border: 28px solid rgba(159,185,216,0.16);
      border-radius: 50%;
      right: -60px;
      bottom: -70px;
    }

    .brand-panel img {
      width: min(210px, 78%);
      position: relative;
      z-index: 1;
      background: var(--white);
      border-radius: 6px;
      padding: 16px;
    }

    .eyebrow {
      display: inline-block;
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 800;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--red);
      margin-bottom: 12px;
      font-size: 0.85rem;
    }

    h1 {
      margin: 0 0 14px;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: clamp(2.5rem, 7vw, 4.5rem);
      line-height: 0.95;
      text-transform: uppercase;
      color: var(--navy);
    }

    p {
      margin: 0 0 26px;
      color: #536179;
      font-size: 1.1rem;
      line-height: 1.65;
      max-width: 560px;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      padding: 13px 22px;
      border-radius: 4px;
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 800;
      letter-spacing: 1px;
      text-transform: uppercase;
      text-decoration: none;
      transition: background .2s, transform .1s, border-color .2s;
    }

    .btn-primary {
      background: var(--red);
      color: var(--white);
    }

    .btn-primary:hover {
      background: var(--red-dark);
      transform: translateY(-1px);
    }

    .btn-secondary {
      color: var(--navy);
      border: 2px solid rgba(13,27,75,0.18);
    }

    .btn-secondary:hover {
      border-color: var(--navy);
      transform: translateY(-1px);
    }

    @media (max-width: 760px) {
      .success-content {
        grid-template-columns: 1fr;
        gap: 24px;
      }

      .brand-panel {
        min-height: 180px;
      }
    }
  </style>
</head>
<body>
  <main class="success-shell">
    <div class="success-content">
      <div class="brand-panel" aria-hidden="true">
        <img src="assets/logo-dc.png" alt="">
      </div>
      <section>
        <span class="eyebrow">Envio confirmado</span>
        <h1>Mensagem enviada com sucesso</h1>
        <p>Recebemos suas informações. A equipe da DC Transportes vai analisar sua mensagem e retornar o contato em breve.</p>
        <div class="actions">
          <a class="btn btn-primary" href="./dc-transportes.html">Voltar ao site</a>
          <a class="btn btn-secondary" href="./dc-transportes.html#contato">Falar conosco</a>
        </div>
      </section>
    </div>
  </main>
</body>
</html>
